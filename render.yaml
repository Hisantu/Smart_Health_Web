services:
  # Single Web Service (Frontend + Backend)
  - type: web
    name: smart-health
    env: node
    plan: free
    buildCommand: |
      cd smart_health/server && npm install &&
      cd ../web && npm install && npm run build
    startCommand: cd smart_health/server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # IMPORTANT: Add MONGO_URL manually in Render Dashboard
      # Use: mongodb+srv://santoshsantu92067_db_user:santu123@cluster1.j98wqmk.mongodb.net/?appName=Cluster1
      - key: JWT_SECRET
        generateValue: true

# Note: Set MONGO_URL environment variable in Render Dashboard with your MongoDB Atlas connection string
# The server will serve both API and frontend from a single service